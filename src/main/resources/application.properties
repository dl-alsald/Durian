server.port=80

spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/durian
spring.datasource.username=durian
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.highlight_sql=true
spring.devtools.livereload.enabled=true

logging.level.org.springframework=info
logging.level.com.durianfirst=debug
#logging.level.org.springframework.security=trace
logging.level.org.springframework.security=debug
logging.level.org.hibernate.type.descriptor.sql=trace
#logging.level.org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder=DEBUG

spring.thymeleaf.cache=false
spring.thymeleaf.prefix=file:src/main/resources/templates/

spring.servlet.multipart.enabled=true
spring.servlet.multipart.location=C:\\upload
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.max-file-size=10MB
org.zerock.upload.path=C:\\upload


