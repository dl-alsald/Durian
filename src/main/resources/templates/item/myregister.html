<th:block th:replace="~{layout/mypageLayout :: setContent(~{this::content} )}">

  <th:block th:fragment="content">


          <div class="col-lg-8" data-aos="fade-up" data-aos-delay="200">
            <div class="section">
              <div class="container">
                <div class="row-c">
                  <div class="col-lg-8" data-aos="fade-up" data-aos-delay="200">
                    <form th:action="@{/item/register}" th:object="${itemDTO}" th:method="post">
                      <div class="row">
                        <!-- 상품명 -->
                        <div class="col-9 mb-3">
                          <input type="text" class="form-control" name="iname" th:field="${itemDTO.iname}" placeholder="상품명"/>
                          <small class="text-danger" th:if="${#fields.hasErrors('iname')}"
                                 th:errors="${itemDTO.iname}"></small>
                        </div>
                        <!-- 카테고리 -->
                        <div class="col-3 mb-3">
                          <fieldset class="form-group">
                            <select class="form-select" id="icategory" name="icategory" >
                              <option value="option1">전자기기</option>
                              <option value="option2">가구</option>
                              <option value="option3">식기류</option>
                              <option value="option4">티켓</option>
                            </select>
                          </fieldset>
                        </div>
                        <!-- 가격 -->
                        <div class="col-12 mb-3" style="height: 39px;">
                          <div class="input-group mb-3">
                            <span class="input-group-text">₩</span>
                            <input type="text" class="form-control"
                                   aria-label="Amount (to the nearest dollar)"
                                   placeholder="가격">
                          </div>
                        </div>
                        <!-- 거래 방식 -->
                        <div class="col-12 mb-3">
                          <input type="text" class="form-control" name="idealway" placeholder="거래방식"/>
                        </div>
                        <!-- 주소 (거래 방식-직거래) -->
                        <div class="col-12 mb-3">
                          <input type="text" class="form-control" name="ilocation" placeholder="주소"/>
                        </div>
                        <!-- 상세 설명 -->
                        <div class="col-12 mb-3">
                                    <textarea name="idesccription" id="" cols="30" rows="7" class="form-control"
                                              placeholder="상세 설명"></textarea>
                        </div>
                        <!-- 이미지 -->
                        <div class="card-body">
                          <div class="row">
                            <div class="col-md-12 mb-1" style=" padding-left: 10px;padding-right: 6px;">
                              <div class="input-group mb-3">
                                <div class="input-group mb-3">
                                  <label class="input-group-text" for="fileInput" data-browse="Browse">
                                    <i class="bi bi-upload"></i>
                                  </label>
                                  <input type="file" class="form-control" id="fileInput"
                                         multiple>
                                </div>
                              </div>
                            </div>
                          </div>
                        </div>

                        <div class="box"></div>

                        <style>
                          .uploadResult {
                            width: 100%;
                            background-color: #ffffff;
                            margin-top: 10px;
                          }

                          .uploadResult ul {
                            display: flex;
                            flex-flow: row;
                            justify-content: center;
                            align-items: center;
                            vertical-align: top;
                            overflow: auto;
                          }

                          .uploadResult ul li {
                            list-style: none;
                            padding: 10px;
                            margin-left: 2em;
                          }

                          .uploadResult ul li img {
                            width: 100px;
                          }
                        </style>

                        <div class="uploadResult"><ul></ul></div>

                        <div class="col-12">
                          <input type="submit" value="등록 하기" class="btn btn-primary"/>
                        </div>
                      </div>
                    </form>
                  </div>
                </div>
              </div>
            </div>
            <!-- /.untree_co-section -->

            <script>
              $(document).ready(function (e) {

                var regex = new RegExp("(.*?)\.(exe|sh|zip|alz|tiff)$");
                var maxSize = 10485760; //10MB

                function checkExtension(fileName, fileSize) {

                  if (fileSize >= maxSize) {
                    alert("파일 사이즈 초과");
                    return false;
                  }

                  if (regex.test(fileName)) {
                    alert("해당 종류의 파일은 업로드할 수 없습니다.");
                    return false;
                  }
                  return true;
                }

                $(".custom-file-input").on("change", function () {

                  var fileName = $(this).val().split("\\").pop();
                  $(this).siblings(".custom-file-label").addClass("selected").html(fileName);

                  var formData = new FormData();

                  var inputFile = $(this);

                  var files = inputFile[0].files;

                  var appended = false;

                  for (var i = 0; i < files.length; i++) {

                    if (!checkExtension(files[i].name, files[i].size)) {
                      return false;
                    }

                    console.log(files[i]);
                    formData.append("uploadFiles", files[i]);
                    appended = true;
                  }

                  //upload를 하지 않는다.
                  if (!appended) {
                    return;
                  }

                  for (var value of formData.values()) {
                    console.log(value);
                  }

                  //실제 업로드 부분
                  //upload ajax
                  $.ajax({
                    url: '/uploadAjax',
                    processData: false,
                    contentType: false,
                    data: formData,
                    type: 'POST',
                    dataType: 'json',
                    success: function (result) {
                      console.log(result);
                      showResult(result);
                    },
                    error: function (jqXHR, textStatus, errorThrown) {
                      console.log(textStatus);
                    }
                  }); //$.ajax
                }); //end change event


                function showResult(uploadResultArr) {

                  var uploadUL = $(".uploadResult ul");

                  var str = "";

                  $(uploadResultArr).each(function (i, obj) {

                    str += "<li data-name='" + obj.fileName + "' data-path='" + obj.folderPath + "' data-uuid='" + obj.uuid + "'>";
                    str + " <div>";
                    str += "<button type='button' data-file=\'" + obj.imageURL + "\' "
                    str += "class='btn-warning btn-sm'>X</button><br>";
                    str += "<img src='/display?fileName=" + obj.thumbnailURL + "'>";
                    str += "</div>";
                    str + "</li>";
                  });

                  uploadUL.append(str);
                }

                $(".uploadResult ").on("click", "li button", function (e) {

                  console.log("delete file");

                  var targetFile = $(this).data("file");

                  var targetLi = $(this).closest("li");

                  $.ajax({
                    url: '/removeFile',
                    data: {fileName: targetFile},
                    dataType: 'text',
                    type: 'POST',
                    success: function (result) {
                      alert(result);

                      targetLi.remove();
                    }
                  }); //$.ajax
                });


                //prevent submit
                $(".btn-primary").on("click", function (e) {
                  e.preventDefault();

                  var str = "";

                  $(".uploadResult li").each(function (i, obj) {
                    var target = $(obj);

                    str += "<input type='hidden' name='imageDTOList[" + i + "].imgName' value='" + target.data('name') + "'>";

                    str += "<input type='hidden' name='imageDTOList[" + i + "].path' value='" + target.data('path') + "'>";

                    str += "<input type='hidden' name='imageDTOList[" + i + "].uuid' value='" + target.data('uuid') + "'>";

                  });

                  //태그들이 추가된 것을 확인한 후에 comment를 제거
                  $(".box").html(str);

                  $("form").submit();

                });
              }); //document ready
            </script>
          </div>
        </div>
      </div>
    </div>
    <!-- /.untree_co-section -->

    </th:block>
    </th:block>
