<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{/layout/basic :: setContent(~{this::content} )}">

    <th:block th:fragment="content">

        <h1 class="mt-4">Item Read Page</h1>

        <div class="form-group">
            <label >Ino</label>
            <input type="text" class="form-control" name="ino" th:value="${dto.ino}" readonly >
        </div>

        <div class="form-group">
            <label >Item Name</label>
            <input type="text" class="form-control" name="iname" th:value="${dto.iname}" readonly >
        </div>
        <div class="form-group">
            <label >Item Price</label>
            <input type="text" class="form-control" name="iprice" th:value="${dto.iprice}" readonly >
        </div>
        <div class="form-group">
            <label >Item Dealway</label>
            <input type="text" class="form-control" name="idealway" th:value="${dto.idealway}" readonly >
        </div>
        <div class="form-group">
            <label >Item Location</label>
            <input type="text" class="form-control" name="ilocation" th:value="${dto.ilocation}" readonly >
        </div>
        <div class="form-group">
            <label >Item Category</label>
            <input type="text" class="form-control" name="icate" th:value="${dto.icate}" readonly >
        </div>
        <div class="form-group">
            <label >Item Condition</label>
            <input type="text" class="form-control" name="icondition" th:value="${dto.icondition}" readonly >
        </div>
        <div class="form-group">
            <label >Item description</label>
            <textarea class="form-control" rows="5" name="idesc" readonly>[[${dto.idesc}]]</textarea>
        </div>
        <div class="form-group">
            <label >RegDate</label>
            <input type="text" class="form-control" name="regDate" th:value="${#temporals.format(dto.regDate, 'yyyy/MM/dd HH:mm:ss')}" readonly>
        </div>
        <div class="form-group">
            <label >ModDate</label>
            <input type="text" class="form-control" name="modDate" th:value="${#temporals.format(dto.modDate, 'yyyy/MM/dd HH:mm:ss')}" readonly>
        </div>

        <div class="uploadResult">
            <ul>
                <li th:each="ItemImage : ${dto.imageDTOList}" th:data-file="${ItemImg.getThumbnailURL()}">
                    <img th:if="${itemImg.pah != null}" th:src="|/display?fileName=${itemImg.getThumbnailUrl()}|">
                </li>
            </ul>
        </div>

        <script>
            $(".uploadResult li").click(function() {
                var file = $(this).data('file');

                console.log(file);

                $('.imageModal.modal-body').html("<img style='width:100%' src='/display?fileName="+file+"&size=1' >")

                $(".imageModal").modal("show");
            })

        </script>


        <a th:href="@{/item/modify(ino = ${dto.ino}, page=${requestDTO.page}, type=${requestDTO.type}, keyword =${requestDTO.keyword})}">
            <button type="button" class="btn btn-primary">Modify</button>
        </a>

        <a th:href="@{/item/list(page=${requestDTO.page} , type=${requestDTO.type}, keyword =${requestDTO.keyword})}">
            <button type="button" class="btn btn-info">List</button>
        </a>

    </th:block>

</th:block>
