<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{layout_admin/header :: setContent(~{this::content} )}">

    <th:block th:fragment="content">
        <div id="app">
            <div id="main">
                <h1 class="mt-4">이벤트
                    <span>
                <a th:href="@{/event/register}">
                    <button type="button" class="btn btn-outline-primary">등록
                    </button>
                </a>
            </span>
                </h1>

                <form action="/event/list" method="get" id="searchForm">
                    <input type="hidden" name="page" value="1">
                </form>

                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th scope="" col>번호</th>
                        <th scope="" col>제목</th>
                        <th scope="" col>등록일</th>
                    </tr>
                    </thead>
                    <tbody>

                    <tr th:each="dto : ${result.dtoList}">
                        <th scope="row">

                            [[${dto.eno}]]

                        </th>
                        <td><a th:href="@{/event/read(eno = ${dto.eno}, page= ${result.page})}">
                            <img th:if="${dto.imageDTOList.size() > 0 && dto.imageDTOList[0].path != null }"
                                 th:src="|/display?fileName=${dto.imageDTOList[0].getThumbnailURL()}|">
                            [[${dto.eno}]]</a></td>
                        <td>[[${#temporals.format(dto.regDate, 'yyyy/MM/dd')}]]</td>
                    </tr>

                    </tbody>
                </table>

                <ul class="pagination h-100 justify-content-center align-items-center">

                    <li class="page-item " th:if="${result.prev}">
                        <a class="page-link" th:href="@{/event/list(page= ${result.start -1})}"
                           tabindex="-1">Previous</a>
                    </li>

                    <li th:class=" 'page-item ' + ${result.page == page?'active':''} "
                        th:each="page: ${result.pageList}">
                        <a class="page-link" th:href="@{/event/list(page = ${page})}">
                            [[${page}]]
                        </a>
                    </li>

                    <li class="page-item" th:if="${result.next}">
                        <a class="page-link" th:href="@{/event/list(page= ${result.end + 1} )}">Next</a>
                    </li>
                </ul>

            </div>
        </div>
        <script th:inline="javascript">

        </script>
    </th:block>

</th:block>
