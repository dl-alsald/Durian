<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout_admin/layout :: setContent(~{this::content} )}">

    <head>
        <meta charset="UTF-8">
        <title>Login - Mazer Admin Dashboard</title>
    </head>

    <th:block th:fragment="content">
        <div id="auth">
            <div class="row h-100">
                <div class="col-lg-5 col-12">
                    <div id="auth-left">
                        <div class="auth-logo">
                            <a th:href="@{/admin/adindex}"><img th:src="@{/assets/images/logo/logo.png}" alt="Logo"></a>
                        </div>
                        <h1 class="auth-title">Forgot Password</h1>
                        <p class="auth-subtitle mb-5">Input your email and we will send you reset password link.</p>

                        <form th:action="@{/admin/adindex}">
                            <div class="form-group position-relative has-icon-left mb-4">
                                <input type="email" class="form-control form-control-xl" placeholder="Email">
                                <div class="form-control-icon">
                                    <i class="bi bi-envelope"></i>
                                </div>
                            </div>
                            <button class="btn btn-primary btn-block btn-lg shadow-lg mt-5">Send</button>
                        </form>
                        <div class="text-center mt-5 text-lg fs-4">
                            <p class='text-gray-600'>Remember your account? <a th:href="@{/admin/auth-login}"
                                                                               class="font-bold">Log in</a>.
                            </p>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7 d-none d-lg-block">
                    <div id="auth-right">
                    </div>
                </div>
            </div>
        </div>
    </th:block>
</th:block>
</html>
