<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<th:block th:replace="~{layout_admin/header :: setContent(~{this::content} )}">

    <th:block th:fragment="content">
        <div id="app">
            <div id="main">
                <h1 class="mt-4">공지사항</h1>

                <div class="form-group">
                    <label>번호</label>
                    <input type="text" class="form-control" name="nno" th:value="${dto.nno}" readonly>
                </div>

                <div class="form-group">
                    <label>제목</label>
                    <input type="text" class="form-control" name="ntitle" th:value="${dto.ntitle}" readonly>
                </div>
                <div class="form-group">
                    <label>내용</label>
                    <textarea class="form-control" rows="5" name="ncontent" readonly>[[${dto.ncontent}]]</textarea>
                </div>

                <div class="form-group">
                    <label>RegDate</label>
                    <input type="text" class="form-control" name="regDate"
                           th:value="${#temporals.format(dto.regDate, 'yyyy/MM/dd HH:mm:ss')}" readonly>
                </div>
                <div class="form-group">
                    <label>ModDate</label>
                    <input type="text" class="form-control" name="modDate"
                           th:value="${#temporals.format(dto.modDate, 'yyyy/MM/dd HH:mm:ss')}" readonly>
                </div>
                <a th:href="@{/admin/notice/modify(nno=${dto.nno})}">
                    <button type="button" class="btn btn-primary">수정</button>
                </a>

                <a th:href="@{/admin/notice/list}">
                    <button type="button" class="btn btn-info">목록</button>
                </a>
            </div>
        </div>
    </th:block>

</th:block>
