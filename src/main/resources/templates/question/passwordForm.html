<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout_admin/layout :: setContent(~{this::content} )}">

    <head>
        <meta charset="UTF-8">
        <title>Input - Mazer Admin Dashboard</title>
    </head>

    <th:block th:fragment="content">
        <div id="app">
            <div id="main-no">
                <br>
                <div class="page-heading">
                    <div class="page-title">
                        <div class="row">
                            <div class="col-12 col-md-6 order-md-1 order-last">
                                <h3>Password</h3>
                                <p class="text-subtitle text-muted">Please enter your question password</p>
                            </div>
                        </div>
                    </div>

                    <!-- Input with Icons start -->
                    <section id="input-with-icons">
                        <div class="row match-height">
                            <div class="col-12">
                                <div class="card">
                                    <div class="card-header">
                                        <h4 class="card-title">Input with Icons</h4>
                                    </div>

                                    <div class="card-body">
                                        <div class="row">
                                            <div class="col-12">
                                                <p>For Input Box with icon use <code>.position-relative</code> class
                                                    with
                                                    <code>.form-group</code> and use class <code>.has-icon-left</code>
                                                    or
                                                    <code>.has-icon-right</code> class for icon on
                                                    left side.
                                                </p>
                                            </div>
                                            <div class="col-sm-6">
                                                <div th:if="${error}" th:text="${error}" style="color: red;">

                                                </div>
                                                <div class="col-md-6 mb-1">
                                                    <form action="/question/checkPassword" method="post">
                                                        <input type="hidden" name="qno" th:value="${dto.qno}">
                                                        <div class="input-group mb-3">
                                                            <span class="input-group-text" id="basic-addon1">
                                                                <i class="bi bi-lock-fill"></i>
                                                            </span>
                                                            <input type="text" class="form-control" id="password" value=""
                                                                   name="password" placeholder="Enter your Answer">
                                                            <button class="btn btn-outline-secondary" type="submit"
                                                                    id="button-addon2">Enter
                                                            </button>
                                                        </div>
                                                    </form>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                    <!-- Input with Icons end -->
                </div>
            </div>
        </div>
    </th:block>
</th:block>
</html>
