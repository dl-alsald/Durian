<head>
  <title>Question Read</title>

<div layout:fragment="content">
  <div class="row mt-3">
    <div class="col">
      <div class="card">
        <div class="card-header">

        </div>
        <div class="card-body">
          <div class="input-group mb-3">
            <span class="input-group-text">번호</span>
            <input type="text" class="form-control" th:value="${dto.qno}" readonly>
          </div>
          <div class="input-group mb-3">
            <span class="input-group-text">제목</span>
            <input type="text" class="form-control" th:value="${dto.qtitle}" readonly>
          </div>
          <div class="input-group mb-3">
            <span class="input-group-text">카테고리</span>
            <input type="text" class="form-control" th:value="${dto.qcate}" readonly>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text">내용</span>
            <textarea class="form-control col-sm-5" rows="5" readonly>[[${dto.qcontent}]]</textarea>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text">작성자</span>
            <input type="text" class="form-control" th:value="${dto.qmember}" readonly>
          </div>

          <div class="input-group mb-3">
            <span class="input-group-text">등록시간</span>
            <input type="text" class="form-control" th:value="${#temporals.format(dto.regTime, 'yyyy-MM-dd HH:mm:ss')}" readonly>
          </div>
          <div class="input-group mb-3">
            <span class="input-group-text">수정시간</span>
            <input type="text" class="form-control" th:value="${#temporals.format(dto.updateTime, 'yyyy-MM-dd HH:mm:ss')}" readonly>
          </div>

        <div class="my-4">

              <button type="button" class="btn btn-outline-success">목록</button>
            </a>
            <a th:href="|@{/templates/question/modify(qno=${dto.qno})}&${link}|" class="text-decoration-none">
