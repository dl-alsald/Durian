<th:block th:replace="~{layout/header :: setContent(~{this::content} )}">

    <th:block th:fragment="content">
        <div class="hero page-inner overlay" style="background-image: url('/images/hero_bg_1.jpg')">
            <div class="container">
                <div class="row justify-content-center align-items-center">
                    <div class="col-lg-9 text-center mt-5-q"> <!-- mt-5-q : header 글 밑 패딩 추가-->
                        <h1 class="heading" data-aos="fade-up">QnA</h1>
                        <nav aria-label="breadcrumb" data-aos="fade-up" data-aos-delay="200">
                            <ol class="breadcrumb text-center justify-content-center">
                                <li class="breadcrumb-item"><a th:href="@{/index}">Home</a></li>
                                <li class="breadcrumb-item active text-white-50" aria-current="page">QnA</li>
                            </ol>
                        </nav>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="container">
                <div class="row">
                    <!-- 주소, 전화번호, 이메일 -->
                    <div class="col-lg-4 mb-5 mb-lg-0" data-aos="fade-up" data-aos-delay="100">
                        <div class="contact-info">
                            <div class="address mt-2">
                                <i class="icon-room"></i>
                                <h4 class="mb-2">Location:</h4>
                                <p>
                                    43 Raymouth Rd. Baltemoer,<br/>
                                    London 3910
                                </p>
                            </div>
                            <div class="open-hours mt-4">
                                <i class="icon-clock-o"></i>
                                <h4 class="mb-2">Open Hours:</h4>
                                <p>
                                    Sunday-Friday:<br/>
                                    11:00 AM - 2300 PM
                                </p>
                            </div>
                            <div class="email mt-4">
                                <i class="icon-envelope"></i>
                                <h4 class="mb-2">Email:</h4>
                                <p>info@Untree.co</p>
                            </div>
                            <div class="phone mt-4">
                                <i class="icon-phone"></i>
                                <h4 class="mb-2">Call:</h4>
                                <p>+1 1234 55488 55</p>
                            </div>
                        </div>
                    </div>
                    <!-- 질문 등록 -->
                    <div class="col-lg-8" data-aos="fade-up" data-aos-delay="200">
                        <form th:action="@{/question/register}" th:object="${questionDTO}" th:method="post" > <!--form을 이용한 입력가능 부분구현-->
                            <div class="row">
                                <!-- 제목 -->
                                <div class="col-9 mb-3">
                                    <input type="text" name="qtitle" class="form-control" placeholder="제목을 입력하세요" th:field="${questionDTO.qtitle}"/>
                                </div>
                                <small class="text-danger" th:if="${#fields.hasErrors('qtitle')}" th:errors="${questionDTO.qtitle}" ></small>
                                <div class="col-3 mb-3">
                                    <fieldset class="form-group">
                                        <select class="form-select" id="qcate" name="qcate"> <!--style="height: 52px;"-->
                                            <option value="option1">배송</option>
                                            <option value="option2">포인트</option>
                                            <option value="option3">신고</option>
                                            <option value="option4">기타</option>
                                        </select>
                                    </fieldset>
                                </div>
                                <!-- 내용 -->
                                <div class="col-12 mb-3">
                                    <textarea name="qcontent" id="" cols="30" rows="7" class="form-control"
                                              placeholder="Message" th:field="${questionDTO.qcontent}"></textarea>
                                </div>
                                <small class="text-danger" th:if="${#fields.hasErrors('qcontent')}" th:errors="${questionDTO.qcontent}" ></small>
                                <!-- 작성자 -->
                                <div class="col-6 mb-3">
                                    <input type="text" name="member" class="form-control" th:value="${#authentication.principal.username}" readonly/>
                                </div>
                                <!-- 비밀글 여부 -->
                                <div class="col-6 mb-3">
                                    <div class="input-group mb-3">
                                        <div class="input-group mb-3">
                                            <div class="input-group-text"> 비밀글 &nbsp;
                                                <input class="form-check-input form-check-success" type="checkbox" value="true" name="secret"
                                                       aria-label="Checkbox for following text input">
                                            </div>
                                            <input type="text" class="form-control" name="password"
                                                   aria-label="Text input with checkbox">
                                        </div>
                                    </div>
                                </div>
                                <!-- 등록 버튼 -->
                                <div class="col-12">
                                    <input type="submit" value="Send Message" class="btn btn-primary"/>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <!-- /.untree_co-section -->

    </th:block>
</th:block>
