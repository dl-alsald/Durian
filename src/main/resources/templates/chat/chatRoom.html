<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout_admin/header :: setContent(~{this::content} )}">

    <head>
        <meta charset="UTF-8">
        <title>Chatbox - Mazer Admin Dashboard</title>



    </head>

    <th:block th:fragment="content">
        <div id="app">
            <div id="main">
                <header class="mb-3">
                    <a href="#" class="burger-btn d-block d-xl-none">
                        <i class="bi bi-justify fs-3"></i>
                    </a>
                </header>
                <div class="page-heading">
                    <div class="page-title">
                        <div class="row">
                            <div class="col-12 col-md-6 order-md-1 order-last">
                                <h3>Chatbox</h3>
                                <p class="text-subtitle text-muted">For user to check they list</p>
                            </div>
                            <div class="col-12 col-md-6 order-md-2 order-first">
                                <nav aria-label="breadcrumb" class="breadcrumb-header float-start float-lg-end">
                                    <ol class="breadcrumb">
                                        <li class="breadcrumb-item"><a th:href="@{/admin/index}">Dashboard</a></li>
                                        <li class="breadcrumb-item active" aria-current="page">Chatbox</li>
                                    </ol>
                                </nav>
                            </div>
                        </div>
                    </div>
                    <section class="section">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="card">
                                    <div class="card-header">
                                        <div class="media d-flex align-items-center">
                                            <div class="avatar me-3">
                                                <img th:src="@{/assets/images/faces/1.jpg}" alt="" srcset="">
                                                <span class="avatar-status bg-success"></span>
                                            </div>
                                            <div class="name flex-grow-1">
                                                <h6 class="mb-0" th:text="${member.mname}"></h6>
                                                <span class="text-xs">Online</span>
                                            </div>
                                            <div class="btn btn-sm">
                                                <button data-feather="x" onclick="quit()">X</button>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- 채팅 부분 -->
                                    <div id="chatArea">
                                        <div class="msgArea" id="chatMessageArea"
                                             style="height: 700px; overflow:scroll"></div>
                                    </div>
                                    <div class="card-footer">
                                        <div class="message-form d-flex flex-direction-column align-items-center">
                                            <a href="http://" class="black"><i data-feather="smile"></i></a>
                                            <div class="d-flex flex-grow-1 ml-4">
                                                <input type="text" class="form-control"
                                                       placeholder="Type your message..">
                                                <div class="buttons-chat">
                                                    <button type="button" class="btn btn-primary" onclick="sendMsg()">
                                                        SEND
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>

        <!-- jQuery 추가 -->
        <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
        <script th:inline="javascript">
            function enterRoom(socket) {
                var enterMsg = {"type": "ENTER", "roomId": [[${room.roomId}]], "sender": "chee", "msg": ""}; //sender는  글쓸때 수정하자.

                socket.send(JSON.stringify(enterMsg));

            }


            let socket = new WebSocket("ws://localhost:80/ws/chat");

            socket.onopen = function (e) {
                console.log('open server!')
                enterRoom(socket);
            };
            socket.onclose = function (e) {
                console.log('disconnet');
            }

            socket.onerror = function (e) {
                console.log(e);
            }

            //메세지 수신했을 때 이벤트.
            socket.onmessage = function (e) {

                console.log(e.data);

                //새로운 메시지가 도착했을 때
                appendMessage(e.data);

                let msgArea = document.querySelector('.msgArea');
                let newMsg = document.createElement('div');
                newMsg.innerText = e.data;
                msgArea.append(newMsg);


            }

            //메세지 보내기 버튼 눌렀을 떄..
            function sendMsg() {
                let content = document.querySelector('.form-control').value;
                var talkMsg = {
                    "type"  : "TALK",
                    "roomId": [[${room.roomId}]],
                    "sender": [[${member.mname}]],
                    "msg"   : content,
                    "isSent": true //보낸 메세지인 경우 true, 받은 메세지인 경우 false
                };
                socket.send(JSON.stringify(talkMsg));
            }

            function quit() {
                var quitMsg = {"type": "QUIT", "roomId": [[${room.roomId}]], "sender": "chee", "msg": ""};
                socket.send(JSON.stringify(quitMsg));
                socket.close();
                location.href = "/chat/chatList";
            }

            function appendMessage(msg) {

                if (msg == '') {
                    return false;
                } else {
                    var message = JSON.parse(msg);
                    var messageType = message.isSent ? 'sent' : 'received';

                    $("#chatMessageArea").append(
                        "<div class='card-body pt-4 bg-grey'>" +
                        "<div class='chat-content'>" +
                        "<div class='chat' data-message-type='" + messageType + "'>" +
                        "<div class='chat-body'>" +
                        "<div class='chat-message'>" + message.msg + "</div>" +
                        "</div>" +
                        "</div>" +
                        "<div class='" + (message.isSent ? 'chat' : 'chat chat-left') + "'>" +
                        "<div class='chat-body'>" +
                        "<div class='chat-message'>" + message.msg + "</div>" +
                        "</div>" +
                        "</div>" +
                        "</div>" +
                        "</div>")

                    var chatAreaHeight = $("#chatArea").height();
                    var maxScroll = $("#chatMessageArea").height() - chatAreaHeight;
                    $("#chatArea").scrollTop(maxScroll);
                }
            }

        </script>
    </th:block>
</th:block>
</html>
