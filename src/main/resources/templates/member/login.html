<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout_admin/layout :: setContent(~{this::content} )}">

    <head>
        <meta charset="UTF-8">
        <title>Login - Mazer Admin Dashboard</title>
    </head>

    <th:block th:fragment="content">
        <div id="auth">
            <div class="row h-100">
                <div class="col-lg-5 col-12">
                    <div id="auth-left">
                        <div class="auth-logo">
                            <a th:href="@{/admin/index}"><img th:src="@{/assets/images/logo/logo.png}" alt="Logo"></a>
                        </div>

                        <!-- LOGOUT -->
                        <th:block th:if="${param.logout != null}">
                            <h1 class="auth-title">Logout</h1>
                        </th:block>

                        <h1 class="auth-title" th:if="${param.logout == null}">Log in.</h1>
                        <p class="auth-subtitle mb-5">Log in with your data that you entered during registration.</p>

                        <form action="/member/login" id="registerForm" method="post" th:if="${param.logout == null}">
                            <!--<input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>-->
                            <!-- 아이디 -->
                            <div class="form-group position-relative has-icon-left mb-4">
                                <input type="text" name="username" class="form-control form-control-xl" placeholder="User ID">
                                <div class="form-control-icon">
                                    <i class="bi bi-person"></i>
                                </div>
                            </div>
                            <!-- 비밀번호 -->
                            <div class="form-group position-relative has-icon-left mb-4">
                                <input type="password" name="password" class="form-control form-control-xl" placeholder="Password">
                                <div class="form-control-icon">
                                    <i class="bi bi-shield-lock"></i>
                                </div>
                            </div>
                            <div class="form-check form-check-lg d-flex align-items-end">
                                <input class="form-check-input me-2" type="checkbox" value="" id="flexCheckDefault" name="remember-me">
                                <label class="form-check-label text-gray-600" for="flexCheckDefault">
                                    Keep me logged in
                                </label>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block btn-lg shadow-lg mt-5">Log in</button>
                        </form>
                        <div class="text-center mt-5 text-lg fs-4">
                            <p class="text-gray-600">Don't have an account? <a th:href="@{/member/register}"
                                                                               class="font-bold">Sign
                                up</a>.</p>
                            <p><a class="font-bold" th:href="@{/admin/auth-forgot-password}">Forgot password?</a>.</p>
                        </div>
                    </div>
                </div>
                <div class="col-lg-7 d-none d-lg-block">
                    <div id="auth-right">
                    </div>
                </div>
            </div>
        </div>
    </th:block>
</th:block>
</html>
