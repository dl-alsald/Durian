<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout_admin/header :: setContent(~{this::content} )}">

    <head>
        <meta charset="UTF-8">
        <title>Input - Mazer Admin Dashboard</title>
    </head>

    <th:block th:fragment="content">
        <div id="app">
            <div id="main">
                <header class="mb-3">
                    <a href="#" class="burger-btn d-block d-xl-none">
                        <i class="bi bi-justify fs-3"></i>
                    </a>
                </header>

                <div class="page-heading">
                    <div class="page-title">
                        <div class="row">
                            <div class="col-12 col-md-6 order-md-1 order-last">
                                <h3>Input</h3>
                                <p class="text-subtitle text-muted">Give textual form controls like input upgrade with
                                    custom styles,
                                    sizing, focus states, and more.</p>
                            </div>
                        </div>
                    </div>
                    <section id="horizontal-input">
                        <div class="row">
                            <div class="col-md-12">
                                <div class="card">
                                    <div class="card-header">
                                        <h4 class="card-title">회원 탈퇴</h4>
                                    </div>
                                    <form method="post">
                                        <div class="card-body">
                                            <div class="row">
                                                <div class="col-md-6">
                                                    <div class="form-group row align-items-center">
                                                        <div class="col-lg-2 col-3">
                                                            <label class="col-form-label">회원 탈퇴</label>
                                                        </div>
                                                        <div class="col-lg-10 col-9" th:if="${mpw == null}">
                                                            <input type="password" id="pwd" class="form-control"
                                                                   name="password"
                                                                   placeholder="비밀번호를 입력해주세요" required>
                                                        </div>
                                                        <div class="col-lg-10 col-9" th:unless="${mpw == null}">
                                                            <input type="password" name="password" class="form-control" id="password" required>
                                                            <label for="password">비밀번호</label>
                                                            <div class="invalid-feedback" th:text="${mpw}"></div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <button type="submit" class="btn btn-primary">회원 탈퇴</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </th:block>
</th:block>
</html>
